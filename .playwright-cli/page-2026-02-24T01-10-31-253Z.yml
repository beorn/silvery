                                - strong [ref=e164]: VirtualList
                                - text: "-- Renders thousands of log lines, stack frames, or profiler entries with O(1) scroll performance. Only items within the visible viewport (plus configurable overscan) are mounted as React elements. Variable item heights, frozen row prefixes, and overflow indicators are built in."
