                                - strong [ref=e167]: Scrollback buffer
                                - text: "-- Log viewers and REPLs produce unbounded output."
                                - code [ref=e168]: overflow="scroll"
                                - text: containers grow as content arrives, track the viewport position, and let users scroll back through the full history with keyboard or mouse. The buffer retains all content — no manual ring buffer or viewport management needed.
