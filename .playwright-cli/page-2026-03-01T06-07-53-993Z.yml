            - text: Key Benefits
            - link "Permalink to \"Key Benefits\"" [ref=e150] [cursor=pointer]:
              - /url: "#key-benefits"
              - text: "#"
          - paragraph [ref=e151]:
            - strong [ref=e152]: Scrollable containers for variable-length output.
            - text: LLM responses range from one line to hundreds. With
            - code [ref=e153]: overflow="scroll"
            - text: on a Box, inkx measures all children, determines which are visible, and renders only those -- no manual height estimation or virtualization config. Just render your messages and let inkx handle the rest.
          - paragraph [ref=e154]:
            - strong [ref=e155]: Command introspection for AI agents.
            - text: The
            - code [ref=e156]: withCommands
            - text: plugin exposes every action with an ID, name, description, and keybindings. Calling
            - code [ref=e157]: cmd.all()
            - text: returns a structured list of everything the app can do. An AI agent can read this to decide which actions to invoke, turning the TUI into a programmable interface rather than a purely visual one.
          - paragraph [ref=e158]:
            - strong [ref=e159]: Streaming-friendly incremental rendering.
            - text: When an LLM streams tokens, only the message being appended changes. inkx tracks dirty flags per node and re-renders only what changed — 169us per update versus 20.7ms for a full-screen repaint (
            - link "benchmarks" [ref=e160] [cursor=pointer]:
              - /url: /inkx/guide/why-inkx.html#performance
            - text: ). At 50 tokens per second, that is the difference between smooth scrolling and visible flicker.
          - paragraph [ref=e161]:
            - strong [ref=e162]: Bracketed paste for code snippets.
            - text: The
            - code [ref=e163]: usePaste
            - text: hook receives multi-line pasted text as a single event instead of individual keystrokes. Users can paste code blocks, stack traces, or configuration files directly into the input area without the app interpreting each line as a separate command.
          - paragraph [ref=e164]:
            - strong [ref=e165]: Scrollback buffer support.
            - text: Long conversations need scrollback — users expect to scroll up through conversation history just like in a web chat. inkx's
            - code [ref=e166]: overflow="scroll"
            - text: "containers handle this natively: content grows downward, the viewport follows the latest message, and users can scroll back through the full history with keyboard or mouse. No manual viewport management, no height estimation, no virtualization config."
          - paragraph [ref=e167]:
            - strong [ref=e168]: Kitty keyboard protocol for rich shortcuts.
            - text: Modern terminals support unambiguous key identification. inkx can distinguish Cmd+K from Ctrl+K, detect key release events, and parse macOS modifier symbols. Build command palettes, chord sequences, and modal interfaces with confidence that key bindings will not collide.
          - 'heading "Example: Minimal AI Chat Permalink to \"Example: Minimal AI Chat\"" [level=2] [ref=e169]':
            - text: "Example: Minimal AI Chat"
            - 'link "Permalink to \"Example: Minimal AI Chat\"" [ref=e170] [cursor=pointer]':
