              - /url: "#ai-assistants-chat-interfaces"
              - text: "#"
          - paragraph [ref=e142]: "Terminal-based AI assistants have unique UI requirements: streaming output that grows unpredictably, long conversation history that must scroll, multi-line code pasting, and the ability for AI agents to discover and invoke actions programmatically. inkx handles all of these out of the box."
          - generic [ref=e143]:
