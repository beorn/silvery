<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Silvery Canvas — Proportional Text</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        background: #0d1117;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        font-family: "Inter", system-ui, sans-serif;
      }
      #wrapper {
        position: relative;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #slider-bar {
        background: #161b22;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid #21262d;
      }
      #slider-bar label {
        color: #8b949e;
        font-size: 12px;
      }
      #slider-bar input[type="range"] {
        flex: 1;
        accent-color: #1f6feb;
        height: 4px;
      }
      #slider-bar .value {
        color: #e6edf3;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        min-width: 40px;
        text-align: right;
      }
      .info {
        color: #484f58;
        font-size: 12px;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <div id="slider-bar">
        <label for="width-slider">Width</label>
        <input type="range" id="width-slider" min="320" max="800" value="480" step="1" />
        <span class="value" id="width-value">480px</span>
      </div>
      <canvas id="canvas" width="480" height="800"></canvas>
    </div>
    <div class="info">Silvery React components · Proportional text (Inter) · Canvas2D · monospace: false</div>
    <script type="module" src="./canvas-proportional.tsx"></script>
  </body>
</html>
