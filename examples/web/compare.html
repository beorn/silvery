<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Silvery — DOM vs Canvas Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #0d1117;
        color: #e6edf3;
        font-family: "Inter", system-ui, sans-serif;
        min-height: 100vh;
        padding: 20px;
      }

      /* Slider bar */
      .controls {
        max-width: 400px;
        margin: 0 auto 16px;
        background: #161b22;
        padding: 10px 20px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid #21262d;
      }
      .controls label {
        color: #8b949e;
        font-size: 13px;
        white-space: nowrap;
      }
      .controls input[type="range"] {
        flex: 1;
        accent-color: #1f6feb;
        height: 4px;
      }
      .controls .value {
        color: #e6edf3;
        font-size: 13px;
        font-variant-numeric: tabular-nums;
        min-width: 44px;
        text-align: right;
      }

      /* Side-by-side layout */
      .comparison {
        display: flex;
        gap: 20px;
        align-items: flex-start;
        justify-content: center;
      }
      .panel {
        flex: 1;
        min-width: 0;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        overflow: hidden;
        border: 1px solid #21262d;
      }
      .panel-header {
        background: #161b22;
        padding: 8px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #21262d;
      }
      .panel-header .label {
        color: #e6edf3;
        font-size: 13px;
        font-weight: 600;
      }
      .panel-header .tech {
        color: #484f58;
        font-size: 11px;
      }
      .panel-content {
        background: #0d1117;
      }
      canvas {
        display: block;
      }

      /* DOM chat styles */
      .dom-chat {
        padding: 16px;
        font-family: "Inter", system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.4;
      }
      .dom-title-bar {
        background: #161b22;
        padding: 8px 12px;
        display: flex;
        justify-content: space-between;
        margin: -16px -16px 0 -16px;
      }
      .dom-title-bar .title {
        font-weight: 600;
        color: #e6edf3;
      }
      .dom-title-bar .subtitle {
        color: #484f58;
        font-size: 14px;
      }
      .dom-bubble-group {
        display: flex;
        flex-direction: column;
        margin-top: 12px;
      }
      .dom-bubble-group.user {
        align-items: flex-end;
      }
      .dom-bubble-group.bot {
        align-items: flex-start;
      }
      .dom-bubble {
        max-width: 300px;
        padding: 8px 12px;
        border-radius: 14px;
        word-wrap: break-word;
        overflow-wrap: break-word;
      }
      .dom-bubble.user {
        background: #1f6feb;
        color: #ffffff;
        border: 1px solid #1f6feb;
      }
      .dom-bubble.bot {
        background: #161b22;
        color: #e6edf3;
        border: 1px solid #30363d;
      }
      .dom-meta {
        color: #484f58;
        font-size: 14px;
        margin-top: 4px;
        line-height: 1.4;
      }
      .dom-callout {
        margin-top: 16px;
        background: #1f6feb22;
        padding: 8px 10px;
        color: #58a6ff;
        font-size: 14px;
        line-height: 1.4;
      }

      .footer {
        margin: 16px auto 0;
        color: #484f58;
        font-size: 12px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <label for="width-slider">Width</label>
      <input type="range" id="width-slider" min="320" max="600" value="480" step="1" />
      <span class="value" id="width-value">480px</span>
    </div>

    <div class="comparison">
      <!-- DOM panel -->
      <div class="panel" id="dom-panel">
        <div class="panel-header">
          <span class="label">DOM (CSS layout)</span>
          <span class="tech">HTML + CSS flexbox</span>
        </div>
        <div class="panel-content">
          <div class="dom-chat" id="dom-chat"></div>
        </div>
      </div>

      <!-- Canvas panel -->
      <div class="panel" id="canvas-panel">
        <div class="panel-header">
          <span class="label">Canvas (Silvery)</span>
          <span class="tech">React + Flexily + Pretext</span>
        </div>
        <div class="panel-content">
          <canvas id="canvas" width="480" height="800"></canvas>
        </div>
      </div>
    </div>

    <div class="footer">
      Same chat data, same font, same max-width. DOM uses CSS flexbox. Canvas uses Silvery's React reconciler + Flexily
      layout + Pretext text measurement.
    </div>

    <script type="module" src="./compare.tsx"></script>
  </body>
</html>
