name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: bun install
      - run: bun run build:all
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Pre-publish gate: real publish + install + import-probe through a
      # local verdaccio. Same script devs run as `bun run verify-publishable`.
      # If this fails, no tarballs reach npm.
      - name: Verify publishable (verdaccio gate)
        run: bun scripts/verify-publishable.ts --no-build

      # Publish packages in dependency order
      # Skip if version already published (idempotent)
      # Use `pnpm publish` (not `npm publish`) so `publishConfig.exports`
      # overrides apply â€” npm ignores them, leaving consumers with
      # `exports â†’ ./src/index.ts` and broken installs (see 0.19.0).
      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish() {
            local dir=$1
            local pkg="./$dir/package.json"
            if [ ! -f "$pkg" ]; then
              echo "âš  $dir/package.json not found â€” skipping"
              return 0
            fi
            local name=$(node -e "console.log(require('$pkg').name)")
            local version=$(node -e "console.log(require('$pkg').version)")
            local private=$(node -e "console.log(require('$pkg').private === true)")
            if [ "$private" = "true" ]; then
              echo "đź”’ $name@$version is private â€” skipping"
              return 0
            fi
            local published=$(npm view "$name@$version" version 2>/dev/null || echo "")
            if [ "$published" = "$version" ]; then
              echo "âŹ­ $name@$version already published"
            else
              echo "đź“¦ Publishing $name@$version..."
              (cd $dir && pnpm publish --access public --no-git-checks)
            fi
          }

          # Layer 1: Core types (no internal deps)
          publish packages/ag

          # Layer 2: Depends on ag
          publish packages/ag-react
          publish packages/scope
          publish packages/signals
          publish packages/model
          publish packages/color
          publish packages/headless

          # Layer 3: Depends on ag + ag-react
          publish packages/theme
          publish packages/ag-term
          publish packages/ansi
          publish packages/commands

          # Layer 4: Depends on ag-term
          publish packages/ink
          publish packages/create
          publish packages/test
          publish packages/commander

          # Layer 5: Root barrel (depends on everything)
          publish .

          # Layer 6: Examples (depends on silvery)
          publish packages/examples

      # Smoke test: verify the JUST-PUBLISHED version resolves correctly.
      # Pin to ${{ github.ref_name }} (e.g. v0.19.2 â†’ 0.19.2) instead of
      # `npm install silvery` (which resolves the `latest` dist-tag and
      # races with CDN propagation immediately after publish).
      - name: Smoke test
        run: |
          version="${GITHUB_REF_NAME#v}"
          dir=$(mktemp -d)
          cd "$dir"
          npm init -y --silent
          echo "Installing silvery@$version from npm..."
          npm install --no-package-lock "silvery@$version" 2>&1
          echo "Verifying import..."
          node --experimental-strip-types -e "import 'silvery'" 2>&1
          echo "âś… Smoke test passed for silvery@$version"
          rm -rf "$dir"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
