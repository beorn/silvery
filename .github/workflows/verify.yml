name: Verify Publishable

# Pre-publish gate using a local verdaccio registry. Catches three classes
# of bug BEFORE tag-publish:
#   (a) wrong publishConfig.exports / missing dist entries
#   (b) empty tarball / missing dist files
#   (c) EPRIVATE on accidentally-listed private packages
#
# The legacy version of this workflow ran `npm install <tgz>` for each packed
# tarball, but the tarballs reference @silvery/<dep>@<thisversion> which is not
# on the public registry yet during release windows — so it failed on every
# push with ETARGET. Verdaccio gives every package a real registry to install
# from, so the gate measures what consumers will actually see.
#
# Local equivalent: `bun run verify-publishable` (or `bun scripts/verify-publishable.ts`).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: bun install

      - name: Verify publishable (verdaccio gate)
        run: bun run verify-publishable
