<style>
  .diagram-05-termless {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 0;
  }

  .diagram-05-termless * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .diagram-05-termless .page {
    max-width: 660px;
    width: 100%;
    position: relative;
  }

  .diagram-05-termless .diagram {
    position: relative;
    max-width: 660px;
    width: 100%;
    display: flex;
    align-items: flex-start;
    gap: 0;
    z-index: 1;
    padding-top: 14px; /* space for phase headings */
    min-height: 140px;
  }

  /* === PHASE HEADINGS === */
  .diagram-05-termless .phase-heading {
    font-size: var(--d-fs-md);
    font-weight: var(--d-fw-medium);
    color: #334155;
    text-align: center;
    margin-bottom: 8px;
    line-height: 1;
  }

  /* === STAGE BOXES === */
  .diagram-05-termless .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .diagram-05-termless .stage-box {
    padding: 8px 10px;
    border-radius: var(--d-radius-lg);
    font-size: var(--d-fs-md);
    font-weight: var(--d-fw-medium);
    text-align: center;
    white-space: nowrap;
    position: relative;
  }

  .diagram-05-termless .stage-app .stage-box {
    background: rgba(86, 180, 233, 0.12);
    border: 2px solid rgba(86, 180, 233, 0.3);
    color: #1e5f8a;
    box-shadow: 0 2px 8px rgba(86, 180, 233, 0.1);
  }

  .diagram-05-termless .stage-ansi .stage-box {
    background: var(--d-terminal-bg);
    border: 2px solid rgba(255, 255, 255, 0.12);
    color: var(--d-terminal-text);
    font-family: var(--d-font-mono);
    font-size: var(--d-fs-sm);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  }
  .diagram-05-termless .ansi-preview {
    background: var(--d-terminal-bg);
    border: 2px solid rgba(255, 255, 255, 0.12);
    border-radius: var(--d-radius-lg);
    padding: 5px 6px;
    font-family: var(--d-font-mono);
    font-size: var(--d-fs-xs);
    line-height: 1.4;
    white-space: pre;
    color: var(--d-terminal-text);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    margin: 0;
  }

  /* === ARROWS === */
  .diagram-05-termless .arrow {
    display: flex;
    align-items: center;
    padding: 0 6px;
    margin-top: 22px; /* align with box content below phase headings */
  }
  .diagram-05-termless .arrow svg {
    display: block;
  }
  .diagram-05-termless .arrow-blue svg {
    color: #56b4e9;
  }
  .diagram-05-termless .arrow-gray svg {
    color: rgba(100, 116, 160, 0.6);
  }
  .diagram-05-termless .arrow-green svg {
    color: #009e73;
  }

  /* === FAN-OUT === */
  .diagram-05-termless .fanout-zone {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .diagram-05-termless .backends-stack {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .diagram-05-termless .backend-row {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .diagram-05-termless .backend-line {
    width: 6px;
    height: 1.5px;
    background: rgba(100, 116, 160, 0.4);
  }

  .diagram-05-termless .backend-chip {
    padding: 2px 5px;
    border-radius: 5px;
    font-size: var(--d-fs-xs);
    font-weight: var(--d-fw-medium);
    white-space: nowrap;
    width: 72px;
    text-align: center;
    background: var(--d-annotation-bg);
    border: 1.5px solid var(--d-annotation-border);
    color: var(--d-annotation-title);
    box-shadow: var(--d-annotation-shadow);
    position: relative;
    flex-shrink: 1;
  }

  .diagram-05-termless .backend-chip.highlight {
    border-color: rgba(86, 180, 233, 0.5);
    background: rgba(86, 180, 233, 0.12);
    color: #56b4e9;
  }

  /* === SCREEN BUFFER as terminal window === */
  .diagram-05-termless .buffer-terminal {
    display: flex;
    flex-direction: column;
    border-radius: var(--d-radius-lg);
    overflow: hidden;
    box-shadow:
      0 2px 6px rgba(0, 0, 0, 0.12),
      0 6px 20px rgba(0, 0, 0, 0.18),
      0 0 0 1px rgba(0, 0, 0, 0.06);
  }
  .diagram-05-termless .buffer-chrome {
    background: var(--d-terminal-chrome);
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
    border-bottom: 1px solid var(--d-terminal-chrome-border);
  }
  .diagram-05-termless .buffer-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .diagram-05-termless .buffer-dot.close {
    background: var(--d-dot-close);
    border: 1px solid var(--d-dot-close-border);
  }
  .diagram-05-termless .buffer-dot.minimize {
    background: var(--d-dot-min);
    border: 1px solid var(--d-dot-min-border);
  }
  .diagram-05-termless .buffer-dot.maximize {
    background: var(--d-dot-max);
    border: 1px solid var(--d-dot-max-border);
  }
  .diagram-05-termless .buffer-body {
    background: var(--d-terminal-bg);
    padding: 4px 6px;
    font-family: var(--d-font-mono);
    font-size: var(--d-fs-xs);
    line-height: 1.3;
    color: #94a3b8;
    white-space: pre;
    width: 80px;
    margin: 0;
  }
  .diagram-05-termless .buffer-body .cell-match {
    color: #009e73;
  }
  .diagram-05-termless .buffer-scrollback {
    background: var(--d-terminal-bg-faded);
    border-radius: var(--d-radius-md) var(--d-radius-md) 0 0;
    padding: 3px 6px;
    margin: 0 4px;
    font-family: var(--d-font-mono);
    font-size: 7px;
    line-height: 1.4;
    color: var(--d-term-comment);
    white-space: pre;
    width: 80px;
    opacity: 0.8;
  }
  /* === ASSERT DETAIL === */
  .diagram-05-termless .assert-detail {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .diagram-05-termless .assert-code {
    background: var(--d-terminal-bg);
    border-radius: var(--d-radius-md);
    padding: 5px 7px;
    border: 1.5px solid rgba(0, 158, 115, 0.25);
    font-family: var(--d-font-mono);
    font-size: var(--d-fs-xs);
    line-height: 1.6;
    color: var(--d-terminal-text);
    white-space: pre;
    margin: 0;
  }
  .diagram-05-termless .assert-fn {
    color: var(--d-term-func);
  }
  .diagram-05-termless .assert-str {
    color: var(--d-term-success);
  }
  .diagram-05-termless .assert-result {
    font-size: var(--d-fs-xs);
    font-weight: var(--d-fw-medium);
    padding: 1px 6px;
    border-radius: var(--d-radius-sm);
  }
  .diagram-05-termless .result-pass {
    background: rgba(0, 158, 115, 0.15);
    color: #009e73;
  }
  .diagram-05-termless .result-fail {
    background: rgba(213, 94, 0, 0.15);
    color: #d55e00;
  }
</style>
