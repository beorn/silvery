<style>
  .diagram-05-termless {
    font-family:
      "Inter",
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 0;
  }

  .diagram-05-termless * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .diagram-05-termless .page {
    max-width: 660px;
    width: 100%;
    position: relative;
  }
  .diagram-05-termless .page::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 560px;
    height: 400px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center, rgba(86, 180, 233, 0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .diagram-05-termless .diagram {
    position: relative;
    max-width: 660px;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 0;
    z-index: 1;
  }

  /* === STAGE BOXES === */
  .diagram-05-termless .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .diagram-05-termless .stage-box {
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    white-space: nowrap;
    position: relative;
  }
  .diagram-05-termless .stage-sub {
    font-size: 10px;
    font-weight: 500;
    color: rgba(100, 116, 160, 0.8);
    margin-top: 2px;
  }

  .diagram-05-termless .stage-app .stage-box {
    background: rgba(86, 180, 233, 0.12);
    border: 2px solid rgba(86, 180, 233, 0.3);
    color: #1e5f8a;
    box-shadow: 0 2px 8px rgba(86, 180, 233, 0.1);
  }

  .diagram-05-termless .stage-ansi .stage-box {
    background: #191922;
    border: 2px solid rgba(255, 255, 255, 0.12);
    color: #d4d8e0;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", "Menlo", "Consolas", monospace;
    font-size: 10px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  }
  .diagram-05-termless .ansi-preview {
    background: #191922;
    border: 2px solid rgba(255, 255, 255, 0.12);
    border-radius: 8px;
    padding: 4px 6px;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", "Menlo", "Consolas", monospace;
    font-size: 8px;
    line-height: 1.5;
    white-space: pre;
    color: #d4d8e0;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  }

  /* === ARROWS === */
  .diagram-05-termless .arrow {
    display: flex;
    align-items: center;
    padding: 0 2px;
  }
  .diagram-05-termless .arrow svg {
    display: block;
  }
  .diagram-05-termless .arrow-blue svg {
    color: #56b4e9;
  }
  .diagram-05-termless .arrow-gray svg {
    color: rgba(100, 116, 160, 0.6);
  }
  .diagram-05-termless .arrow-green svg {
    color: #009e73;
  }

  /* === FAN-OUT === */
  .diagram-05-termless .fanout-zone {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .diagram-05-termless .backends-stack {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .diagram-05-termless .backend-row {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .diagram-05-termless .backend-line {
    width: 6px;
    height: 1.5px;
    background: rgba(100, 116, 160, 0.4);
  }

  .diagram-05-termless .backend-chip {
    padding: 3px 6px;
    border-radius: 5px;
    font-size: 9px;
    font-weight: 600;
    white-space: nowrap;
    background: white;
    border: 1.5px solid rgba(0, 0, 0, 0.08);
    color: #334155;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    position: relative;
    flex-shrink: 1;
  }

  .diagram-05-termless .backend-chip.highlight {
    border-color: rgba(86, 180, 233, 0.3);
    background: rgba(86, 180, 233, 0.06);
    color: #1e5f8a;
  }

  /* === SCREEN BUFFER as terminal window === */
  .diagram-05-termless .buffer-terminal {
    display: flex;
    flex-direction: column;
    border-radius: 8px;
    overflow: hidden;
    box-shadow:
      0 2px 6px rgba(0, 0, 0, 0.12),
      0 6px 20px rgba(0, 0, 0, 0.18),
      0 0 0 1px rgba(0, 0, 0, 0.06);
  }
  .diagram-05-termless .buffer-chrome {
    background: linear-gradient(to bottom, #3c3c48, #2e2e3a);
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
    border-bottom: 1px solid rgba(60, 60, 70, 0.5);
  }
  .diagram-05-termless .buffer-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .diagram-05-termless .buffer-dot.close {
    background: #ff5f57;
    border: 1px solid #e0443e;
  }
  .diagram-05-termless .buffer-dot.minimize {
    background: #febc2e;
    border: 1px solid #dea123;
  }
  .diagram-05-termless .buffer-dot.maximize {
    background: #28c840;
    border: 1px solid #1aab29;
  }
  .diagram-05-termless .buffer-body {
    background: #191922;
    padding: 6px 8px;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", "Menlo", "Consolas", monospace;
    font-size: 9px;
    line-height: 1.4;
    color: #94a3b8;
    white-space: pre;
    width: 70px;
  }
  .diagram-05-termless .buffer-body .cell-match {
    color: #009e73;
  }
  .diagram-05-termless .buffer-scrollback {
    background: rgba(20, 20, 32, 0.35);
    border-radius: 6px 6px 0 0;
    padding: 3px 6px;
    font-family: "SF Mono", monospace;
    font-size: 7px;
    line-height: 1.4;
    color: #6b7585;
    white-space: pre;
    width: 70px;
    opacity: 0.6;
  }
  .diagram-05-termless .buffer-title {
    font-family: "Inter", sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: rgba(100, 116, 160, 0.8);
    text-align: center;
    margin-top: 5px;
  }

  /* === ASSERT DETAIL === */
  .diagram-05-termless .assert-detail {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .diagram-05-termless .assert-code {
    background: #191922;
    border-radius: 6px;
    padding: 5px 7px;
    border: 1.5px solid rgba(0, 158, 115, 0.25);
    font-family: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", "Menlo", "Consolas", monospace;
    font-size: 9px;
    line-height: 1.6;
    color: #d4d8e0;
    white-space: pre;
  }
  .diagram-05-termless .assert-fn {
    color: #79c0ff;
  }
  .diagram-05-termless .assert-str {
    color: #a5d6a7;
  }
  .diagram-05-termless .assert-result {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .diagram-05-termless .result-pass {
    background: rgba(0, 158, 115, 0.15);
    color: #009e73;
  }
  .diagram-05-termless .result-fail {
    background: rgba(213, 94, 0, 0.15);
    color: #d55e00;
  }

  /* === DARK MODE === */
  @media (prefers-color-scheme: dark) {
    .diagram-05-termless {
      background: #1a1a2e;
    }

    .diagram-05-termless .stage-app .stage-box {
      background: rgba(86, 180, 233, 0.12);
      border-color: rgba(86, 180, 233, 0.4);
      color: #93c5fd;
    }
    .diagram-05-termless .stage-sub {
      color: #64748b;
    }

    .diagram-05-termless .backend-chip {
      background: #2a2a3a;
      border-color: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
    }
    .diagram-05-termless .backend-chip.highlight {
      background: rgba(86, 180, 233, 0.12);
      border-color: rgba(86, 180, 233, 0.4);
      color: #93c5fd;
    }

    .diagram-05-termless .backend-line {
      background: #4a5568;
    }
    .diagram-05-termless .arrow-gray svg {
      color: #4a5568;
    }

    .diagram-05-termless .buffer-body {
      border-color: rgba(0, 158, 115, 0.35);
    }
    .diagram-05-termless .assert-code {
      border-color: rgba(0, 158, 115, 0.35);
    }

    .diagram-05-termless .result-pass {
      background: rgba(0, 158, 115, 0.2);
      color: #86efac;
    }
    .diagram-05-termless .result-fail {
      background: rgba(213, 94, 0, 0.2);
      color: #fca5a5;
    }
  }
</style>

<div class="diagram-05-termless">
