<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" width="100%">
  <style>
    text { font-family: ui-monospace, 'Cascadia Code', 'Fira Code', Menlo, Consolas, monospace; font-size: 13px; fill: #cdd6f4; }
    .b { font-weight: bold; }
    .c { fill: #89b4fa; }
    .g { fill: #a6e3a1; }
    .d { fill: #6c7086; }
  </style>
  <rect width="520" height="340" rx="8" fill="#1e1e2e"/>

  <text y="28" x="18" fill="#bac2de">$ deploy --help</text>

  <text y="56" x="18"><tspan class="b">Usage:</tspan></text>
  <text y="56" x="72" class="c">deploy</text>
  <text y="56" x="120" class="g">[options] [command]</text>

  <text y="78" x="18">Deploy services to an environment</text>

  <text y="108" x="18" class="b">Options:</text>
  <text y="128" x="30" class="g">-V, --version</text>      <text y="128" x="220" class="d">output the version number</text>
  <text y="146" x="30" class="g">-e, --env &lt;env&gt;</text>  <text y="146" x="220" class="d">Target environment</text>
  <text y="164" x="30" class="g">-f, --force</text>        <text y="164" x="220" class="d">Skip confirmation</text>
  <text y="182" x="30" class="g">-v, --verbose</text>      <text y="182" x="220" class="d">Verbose output</text>
  <text y="200" x="30" class="g">-h, --help</text>         <text y="200" x="220" class="d">display help for command</text>

  <text y="230" x="18" class="b">Commands:</text>
  <text y="250" x="30" class="c">start</text>  <text y="250" x="75" class="g">&lt;service&gt;</text>   <text y="250" x="220" class="d">Start a service</text>
  <text y="268" x="30" class="c">stop</text>   <text y="268" x="67" class="g">&lt;service&gt;</text>    <text y="268" x="220" class="d">Stop a running service</text>
  <text y="286" x="30" class="c">status</text>                                          <text y="286" x="220" class="d">Show service status</text>
  <text y="304" x="30" class="c">help</text>   <text y="304" x="67" class="g">[command]</text>   <text y="304" x="220" class="d">display help for command</text>
</svg>
