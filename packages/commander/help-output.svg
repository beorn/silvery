<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 620 280">
  <rect width="620" height="280" rx="8" fill="#1e1e2e"/>
  <foreignObject x="0" y="0" width="620" height="280">
    <div xmlns="http://www.w3.org/1999/xhtml" style="
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      padding: 16px 20px;
      color: #cdd6f4;
    ">
      <div>$ deploy --help</div>
      <br/>
      <div><b>Usage:</b> <span style="color:#89b4fa">deploy</span> <span style="color:#a6e3a1">[options]</span></div>
      <br/>
      <div>Deploy to an environment</div>
      <br/>
      <div><b>Options:</b></div>
      <table style="border-collapse:collapse; margin-left:8px">
        <tr><td style="padding:1px 16px 1px 0; color:#a6e3a1; white-space:nowrap">-V, --version</td><td style="color:#6c7086">output the version number</td></tr>
        <tr><td style="padding:1px 16px 1px 0; color:#a6e3a1; white-space:nowrap">-e, --env &lt;env&gt;</td><td style="color:#6c7086">Target environment</td></tr>
        <tr><td style="padding:1px 16px 1px 0; color:#a6e3a1; white-space:nowrap">-p, --port &lt;n&gt;</td><td style="color:#6c7086">Port number</td></tr>
        <tr><td style="padding:1px 16px 1px 0; color:#a6e3a1; white-space:nowrap">-r, --retries &lt;n&gt;</td><td style="color:#6c7086">Retry count</td></tr>
        <tr><td style="padding:1px 16px 1px 0; color:#a6e3a1; white-space:nowrap">--tags &lt;t&gt;</td><td style="color:#6c7086">Labels</td></tr>
        <tr><td style="padding:1px 16px 1px 0; color:#a6e3a1; white-space:nowrap">-f, --force</td><td style="color:#6c7086">Skip confirmation</td></tr>
        <tr><td style="padding:1px 16px 1px 0; color:#a6e3a1; white-space:nowrap">-h, --help</td><td style="color:#6c7086">display help for command</td></tr>
      </table>
    </div>
  </foreignObject>
</svg>
